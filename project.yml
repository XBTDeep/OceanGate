name: OceanGate
options:
  bundleIdPrefix: com.deep
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
targets:
  OceanGate:
    type: application
    platform: iOS
    sources:
      - path: OceanGate
    configFiles:
      Debug: Config/OpenSea.local.xcconfig
      Release: Config/OpenSea.local.xcconfig
    info:
      path: OceanGate/Info.plist
      properties:
        CFBundleDisplayName: Neon Atlas
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        OpenSeaAPIKey: $(OPENSEA_API_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deep.neonatlas
        INFOPLIST_KEY_UIUserInterfaceStyle: dark
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
